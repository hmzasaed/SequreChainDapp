<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F3A8F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="192" height="192" rx="40" fill="url(#bgGradient)"/>
  
  <!-- Lock shield shape -->
  <g transform="translate(96, 96)">
    <!-- Shield background -->
    <path d="M -35 -25 L -35 15 Q 0 45 35 15 L 35 -25 Z" fill="none" stroke="url(#chainGradient)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Lock body -->
    <rect x="-18" y="5" width="36" height="25" rx="4" fill="url(#chainGradient)" opacity="0.9"/>
    
    <!-- Lock shackle -->
    <path d="M -12 5 Q -12 -10 0 -10 Q 12 -10 12 5" fill="none" stroke="url(#chainGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Lock keyhole -->
    <circle cx="0" cy="12" r="4" fill="#030D1A"/>
    
    <!-- Blockchain chain links (decorative) -->
    <g opacity="0.6">
      <circle cx="-28" cy="-32" r="5" fill="url(#chainGradient)"/>
      <circle cx="0" cy="-35" r="5" fill="url(#chainGradient)"/>
      <circle cx="28" cy="-32" r="5" fill="url(#chainGradient)"/>
    </g>
  </g>
  
  <!-- Accent corners for tech feel -->
  <circle cx="20" cy="20" r="3" fill="#00D9FF" opacity="0.8"/>
  <circle cx="172" cy="172" r="3" fill="#00D9FF" opacity="0.8"/>
</svg>