<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A56DB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0F3A8F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#030D1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#splashGradient)"/>
  
  <!-- Decorative circle elements -->
  <circle cx="200" cy="300" r="150" fill="url(#chainGradient)" opacity="0.1"/>
  <circle cx="900" cy="1500" r="200" fill="url(#chainGradient)" opacity="0.1"/>
  
  <!-- Main Logo -->
  <g transform="translate(540, 700)">
    <!-- Large Shield background -->
    <path d="M -100 -80 L -100 120 Q 0 250 100 120 L 100 -80 Z" fill="none" stroke="url(#chainGradient)" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Lock body -->
    <rect x="-50" y="20" width="100" height="70" rx="12" fill="url(#chainGradient)" opacity="0.9"/>
    
    <!-- Lock shackle -->
    <path d="M -30 20 Q -30 -40 0 -40 Q 30 -40 30 20" fill="none" stroke="url(#chainGradient)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Lock keyhole -->
    <circle cx="0" cy="40" r="12" fill="#030D1A"/>
  </g>
  
  <!-- App Name -->
  <text x="540" y="1100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="#00D9FF">
    SeQureChain
  </text>
  
  <!-- Tagline -->
  <text x="540" y="1200" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#00D9FF" opacity="0.8">
    Blockchain Evidence Management
  </text>
  
  <!-- Accent dots -->
  <circle cx="150" cy="150" r="8" fill="#00D9FF" opacity="0.6"/>
  <circle cx="950" cy="1850" r="8" fill="#00D9FF" opacity="0.6"/>
  <circle cx="540" cy="1600" r="6" fill="#00D9FF" opacity="0.4"/>
</svg>